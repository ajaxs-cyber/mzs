{% extends "admin/base.html" %}

{% block title %}{{ title }} | 钢琴音乐角 管理后台{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">钢琴音乐角 · 管理后台</a></h1>
{% endblock %}

{% block extrahead %}{{ block.super }}
<style>
/* ═══ 纯颜色替换，不动布局 ═══ */

/* ── body ── */
body {
  background: #111119;
  color: #d0d0d0;
}
body.login {
  background: linear-gradient(155deg, #0c0c16 0%, #181830 50%, #0c0c1a 100%);
}

/* ── header ── */
#header {
  background: #131320;
  color: #c9a96e;
  border-bottom: 1px solid rgba(201,169,110,0.15);
}
#header a:link, #header a:visited { color: #c9a96e; }
#header #user-tools { color: #777; }
#header #user-tools a { color: #c9a96e; }

/* ── breadcrumbs ── */
div.breadcrumbs {
  background: rgba(255,255,255,0.02);
  color: #777;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
div.breadcrumbs a { color: #c9a96e; }

/* ── 侧边栏 ── */
#nav-sidebar {
  background: #131320;
  border-right: 1px solid rgba(255,255,255,0.06);
}

/* ── 内容标题 ── */
#content h1 { color: #c9a96e; }

/* ── 卡片 module ── */
.module {
  background: #1a1a28;
  border: 1px solid rgba(255,255,255,0.06);
}
.module caption {
  background: rgba(201,169,110,0.06);
  color: #c9a96e;
}
.module h2 {
  background: rgba(201,169,110,0.04);
  color: #c9a96e;
}

/* ── 表格 ── */
table { color: #d0d0d0; }
thead th {
  background: rgba(0,0,0,0.20);
  color: #7a7a8a;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
tbody td, tbody th {
  border-bottom: 1px solid rgba(255,255,255,0.035);
  color: #d0d0d0;
}
tbody tr:nth-child(even) td { background: rgba(255,255,255,0.012); }
tbody tr:hover td { background: rgba(201,169,110,0.025); }

/* ── 链接 ── */
a:link, a:visited { color: #c9a96e; }
tbody td a:link, tbody td a:visited { color: #c9a96e; }

/* ── 表单 ── */
input[type="text"], input[type="password"], input[type="email"],
input[type="url"], input[type="number"], textarea, select,
.vTextField {
  background: rgba(0,0,0,0.28);
  border: 1px solid rgba(255,255,255,0.10);
  color: #d0d0d0;
}
input:focus, textarea:focus, select:focus {
  border-color: #c9a96e;
  outline: none;
}
.form-row { border-bottom-color: rgba(255,255,255,0.035); }
.form-row label { color: #d0d0d0; }
fieldset.module { border: none; }
.help { color: #7a7a8a !important; }
.submit-row { background: transparent !important; border: none !important; }

/* ── 按钮 ── */
.button, input[type="submit"], input[type="button"],
.submit-row input {
  background: #a6843d;
  color: #fff;
  border: none;
}
.button:hover, input[type="submit"]:hover { background: #b8954e; }
.button.default, input[type="submit"].default,
.submit-row input.default {
  background: #c9a96e;
  color: #1a1a2e;
}
.button.default:hover { background: #d4b87a; }
a.button:link, a.button:visited { color: #fff; }
.object-tools a.addlink, .object-tools a.historylink {
  background: #a6843d;
  color: #fff;
}
.object-tools a.addlink:hover { background: #b8954e; }
a.deletelink:link, a.deletelink:visited {
  background: #b52525;
  color: #fff;
}

/* ── 搜索 ── */
#changelist-search input[type="text"] {
  background: rgba(0,0,0,0.28);
  border-color: rgba(255,255,255,0.10);
  color: #d0d0d0;
}

/* ── 筛选 ── */
#changelist-filter {
  background: #1a1a28;
  border: 1px solid rgba(255,255,255,0.06);
}
#changelist-filter h2 {
  background: transparent;
  color: #c9a96e;
}
#changelist-filter h3 { color: #7a7a8a; }
#changelist-filter a { color: #999; }
#changelist-filter li.selected a { color: #c9a96e !important; }

/* ── 分页 ── */
#changelist .paginator {
  background: rgba(0,0,0,0.08);
  border-top-color: rgba(255,255,255,0.06);
  color: #777;
}
.paginator a { color: #c9a96e; }

/* ── 操作下拉 ── */
.actions select {
  background: rgba(0,0,0,0.28);
  color: #d0d0d0;
  border-color: rgba(255,255,255,0.10);
}

/* ── 消息提示 ── */
.messagelist li {
  background: rgba(201,169,110,0.06);
  border-color: rgba(201,169,110,0.15);
  color: #c9a96e;
}
.messagelist li.success {
  background: rgba(80,160,100,0.06);
  border-color: rgba(80,160,100,0.15);
  color: #7cc898;
}
.messagelist li.error {
  background: rgba(200,70,50,0.06);
  border-color: rgba(200,70,50,0.15);
  color: #e07b5a;
}

/* ── 登录页 ── */
.login #container {
  background: #1a1a28;
  border: 1px solid rgba(255,255,255,0.06);
}
.login .form-row label { color: #d0d0d0; }
.login .form-row input {
  background: rgba(0,0,0,0.3);
  border-color: rgba(255,255,255,0.10);
  color: #d0d0d0;
}
.login .submit-row input {
  background: #c9a96e;
  color: #1a1a2e;
}

/* ── 统计卡片（首页） ── */
.dash-card {
  background: #1a1a28;
  border: 1px solid rgba(255,255,255,0.06);
}
.dash-card .dash-value { color: #c9a96e; }
.dash-card .dash-label { color: #7a7a8a; }

/* ── selector ── */
.selector-available h2, .selector-chosen h2 {
  background: rgba(201,169,110,0.06);
  color: #c9a96e;
}

/* ── 滚动条 ── */
::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
}
::-webkit-scrollbar-thumb:hover {
  background: rgba(255,255,255,0.15);
}
</style>
{% endblock %}
