<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>钢琴音乐角 · 乐善同行</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.css">
<style>
:root{--gold:#c9a96e;--card:rgba(255,255,255,0.028);--border:rgba(255,255,255,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#080810;color:#bbb;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* ═══ Top Nav ═══ */
#nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:48px;flex-shrink:0;background:rgba(10,10,18,.95);border-bottom:1px solid rgba(255,255,255,.04);z-index:10}
#nav .logo{color:var(--gold);text-decoration:none;font-size:.95rem;font-weight:300;letter-spacing:3px}
#nav .links{display:flex;gap:18px}
#nav .links a{color:#666;text-decoration:none;font-size:.78rem;transition:color .2s;letter-spacing:1px}
#nav .links a:hover{color:var(--gold)}
#nav .links a.active{color:var(--gold)}

/* ═══ Main Layout ═══ */
#main{flex:1;display:flex;min-height:0;overflow:hidden}
@media(max-width:860px){#main{flex-direction:column}}

/* ═══ Left Panel - Hero ═══ */
.panel-hero{flex:0 0 360px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;background:radial-gradient(ellipse 80% 50% at 50% 35%,rgba(180,160,100,.06) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 20% 80%,rgba(100,130,170,.03) 0%,transparent 50%),linear-gradient(180deg,#0c0c18 0%,#0e0e1e 40%,#0a0a14 100%);border-right:1px solid rgba(255,255,255,.04)}
@media(max-width:860px){.panel-hero{flex:0 0 auto;padding:50px 20px 40px;border-right:none;border-bottom:1px solid rgba(255,255,255,.04)}}
.panel-hero::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.006) 2px,rgba(255,255,255,.006) 4px);pointer-events:none}
.panel-hero h1{font-size:2rem;color:var(--gold);font-weight:200;letter-spacing:8px;z-index:1;text-shadow:0 0 60px rgba(201,169,110,.15)}
.panel-hero .sub{font-size:.88rem;color:#555;margin-top:10px;z-index:1;letter-spacing:5px}
.panel-hero .guide{font-size:.9rem;color:#777;margin-top:22px;z-index:1;letter-spacing:2px;line-height:1.7}
.music-box{margin-top:24px;z-index:1;width:88%;max-width:340px}
.aplayer{background:rgba(255,255,255,.03)!important;border-radius:12px!important;border:1px solid rgba(255,255,255,.05)!important;backdrop-filter:blur(8px)}
.aplayer .aplayer-info .aplayer-music{color:#aaa!important}
.aplayer .aplayer-info .aplayer-controller .aplayer-time{color:#666!important}
.aplayer .aplayer-pic{border-radius:8px!important}
@media(max-width:860px){.music-box{max-width:300px}}
.panel-hero .tag{display:inline-block;padding:3px 14px;border:1px solid rgba(201,169,110,.2);border-radius:16px;font-size:.7rem;color:var(--gold);letter-spacing:2px;margin-bottom:14px;z-index:1}

/* ═══ Right Panel ═══ */
.panel-right{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
@media(max-width:860px){.panel-right{flex:1}}

/* ═══ Right: Section Header ═══ */
.section-head{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.04)}
.section-head h3{color:var(--gold);font-size:.88rem;font-weight:400;letter-spacing:2px}

/* ═══ Right: Cases + Messages split ═══ */
.content-row{flex:1;display:flex;min-height:0;overflow:hidden}
@media(max-width:860px){.content-row{flex-direction:column}}

/* ── Cases Column ── */
.col-cases{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid rgba(255,255,255,.04)}
@media(max-width:860px){.col-cases{flex:1;border-right:none;border-bottom:1px solid rgba(255,255,255,.04)}}
.col-cases .section-head{border-bottom-color:rgba(255,255,255,.04)}
.cases-scroll{flex:1;overflow-y:auto;padding:16px 18px}
.cases-scroll::-webkit-scrollbar{width:4px}
.cases-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}

.story-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.story-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.story-card:nth-child(1)::before{background:#e8c56d}.story-card:nth-child(2)::before{background:#7ec8a0}.story-card:nth-child(3)::before{background:#6baddf}.story-card:nth-child(4)::before{background:#c47f6e}.story-card:nth-child(5)::before{background:#a09cd4}
.story-card:hover{transform:translateX(3px);border-color:rgba(255,255,255,.1)}
.story-card .ch{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.story-card .ci{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.story-card:nth-child(1) .ci{background:rgba(232,197,109,.1)}.story-card:nth-child(2) .ci{background:rgba(126,200,160,.08)}.story-card:nth-child(3) .ci{background:rgba(107,173,223,.1)}.story-card:nth-child(4) .ci{background:rgba(196,127,110,.1)}.story-card:nth-child(5) .ci{background:rgba(160,156,212,.1)}
.story-card h4{font-size:.9rem;color:#ddd;font-weight:400}
.story-card .dept{display:inline-block;font-size:.68rem;color:var(--gold);background:rgba(201,169,110,.07);padding:2px 8px;border-radius:8px;margin-top:2px}
.story-card .excerpt{font-size:.8rem;color:#777;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.story-card .more{font-size:.74rem;color:var(--gold);opacity:.5;transition:opacity .2s}
.story-card:hover .more{opacity:1}

/* ── Messages Column ── */
.col-msgs{flex:1;display:flex;flex-direction:column;min-width:0}
.col-msgs .section-head{border-bottom-color:rgba(255,255,255,.04)}
.msgs-scroll{flex:1;overflow-y:auto;padding:12px 18px 8px}
.msgs-scroll::-webkit-scrollbar{width:4px}
.msgs-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}

.msg-write{padding:10px 18px;display:flex;gap:8px;border-top:1px solid var(--border);flex-shrink:0;background:rgba(0,0,0,.1)}
.msg-write input{flex:1;min-width:0;border:1px solid rgba(255,255,255,.07);border-radius:6px;color:#ccc;padding:8px 12px;font-size:.82rem;outline:none;background:rgba(0,0,0,.18);font-family:inherit}
.msg-write input::placeholder,.msg-write textarea::placeholder{color:#555}
.msg-write textarea{width:100%;height:52px;border:1px solid rgba(255,255,255,.07);border-radius:6px;color:#ccc;padding:8px 12px;font-size:.82rem;resize:none;outline:none;background:rgba(0,0,0,.18);font-family:inherit;margin-bottom:8px}
.msg-write input:focus,.msg-write textarea:focus{border-color:var(--gold)}
.msg-write .wr{display:flex;flex-direction:column;gap:8px;flex:1}
.msg-write button{background:linear-gradient(135deg,#9a7b2e,#7a5e1e);color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:.82rem;transition:all .2s;letter-spacing:1px;white-space:nowrap;align-self:flex-end}
.msg-write button:hover{opacity:.85}

.msg-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.025)}
.msg-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#6b5010);color:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;font-weight:500}
.msg-name{font-size:.78rem;color:var(--gold);margin-bottom:2px}
.msg-text{font-size:.82rem;color:#999;line-height:1.5}
.msg-time{font-size:.7rem;color:#555;margin-left:6px}

/* ═══ Modal ═══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#12121e;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:32px 30px;max-width:650px;width:92%;max-height:80vh;overflow-y:auto;position:relative}
.modal .close{position:absolute;top:14px;right:18px;color:#555;font-size:1.2rem;cursor:pointer;background:none;border:none;transition:color .2s}
.modal .close:hover{color:var(--gold)}
.modal .md-dept{display:inline-block;font-size:.74rem;color:var(--gold);background:rgba(201,169,110,.07);padding:3px 12px;border-radius:10px;margin-bottom:14px}
.modal h3{font-size:1.1rem;color:#ddd;margin-bottom:18px;font-weight:400}
.modal .story-body{font-size:.88rem;color:#999;line-height:2;margin-bottom:22px;white-space:pre-line}
.modal .quote{background:linear-gradient(135deg,rgba(201,169,110,.04),rgba(201,169,110,.01));border-left:3px solid var(--gold);padding:16px 20px;border-radius:0 10px 10px 0;color:#aaa;line-height:1.8;font-size:.88rem;font-style:italic}
.modal .quote::before{content:'"';font-size:1.8rem;color:var(--gold);line-height:0;vertical-align:middle;margin-right:5px;opacity:.4}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* ═══ Survey Float ═══ */
.survey-float{position:fixed;right:18px;bottom:60px;z-index:50}
.survey-float button{background:linear-gradient(135deg,var(--gold),#9a7b2e);color:#151515;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;font-size:.8rem;box-shadow:0 3px 20px rgba(201,169,110,.12);transition:all .25s;letter-spacing:1px;font-weight:500}
.survey-float button:hover{transform:scale(1.06)}
.survey-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
.survey-modal.show{display:flex}
.survey-box{background:#12121e;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:30px;max-width:540px;width:92%;max-height:80vh;overflow-y:auto;position:relative}
.survey-box h3{color:var(--gold);text-align:center;margin-bottom:26px;font-weight:300;letter-spacing:3px;font-size:1.05rem}
.survey-q{margin-bottom:20px}
.survey-q label{display:block;color:#888;margin-bottom:6px;font-size:.82rem}
.stars{display:flex;gap:10px}
.star{font-size:1.5rem;color:#2a2a2a;cursor:pointer;transition:color .2s,transform .15s}
.star:hover{transform:scale(1.15)}.star.active,.star:hover{color:var(--gold)}
.survey-box textarea{width:100%;height:68px;border:1px solid rgba(255,255,255,.07);border-radius:8px;color:#ccc;padding:10px 14px;font-size:.82rem;resize:none;outline:none;background:rgba(0,0,0,.18);font-family:inherit}
.survey-box textarea:focus{border-color:var(--gold)}
.survey-box .sbtn{display:block;width:100%;background:linear-gradient(135deg,var(--gold),#9a7b2e);color:#151515;border:none;padding:12px;border-radius:8px;font-size:.9rem;cursor:pointer;margin-top:14px;transition:all .25s;letter-spacing:2px;font-weight:500}
.survey-box .sbtn:hover{opacity:.85}
.survey-thanks{display:none;text-align:center;color:var(--gold);padding:50px 20px;font-size:1.05rem}

/* ═══ Toast ═══ */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold),#9a7b2e);color:#151515;padding:9px 26px;border-radius:20px;font-size:.83rem;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;font-weight:500}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<nav id="nav">
  <a href="/" class="logo">钢琴音乐角</a>
  <div class="links">
    <a href="/experiment/">AB对照</a>
    <a href="/stats/">统计</a>
    {% if user.is_authenticated %}
    <a href="/profile/">个人中心</a>
    <a href="/logout/">退出</a>
    {% else %}
    <a href="/login/">登录</a>
    <a href="/register/">注册</a>
    {% endif %}
  </div>
</nav>

<div id="main">

  <!-- ═══ Left: Hero ═══ -->
  <aside class="panel-hero">
    <span class="tag">PIANO MUSIC CORNER</span>
    <h1>钢琴音乐角</h1>
    <p class="sub">乐 善 同 行</p>
    <p class="guide">请在聆听钢琴演奏的同时<br>浏览网站内容</p>
    <div class="music-box" id="aplayer"></div>
  </aside>

  <!-- ═══ Right: Cases + Messages ═══ -->
  <div class="panel-right">

    <div class="content-row">

      <!-- Cases -->
      <div class="col-cases">
        <div class="section-head"><h3>成功救助病例</h3></div>
        <div class="cases-scroll" id="cases-grid"></div>
      </div>

      <!-- Messages -->
      <div class="col-msgs">
        <div class="section-head"><h3>留言板</h3></div>
        <div class="msgs-scroll" id="msg-list"></div>
        <div class="msg-write">
          <div class="wr">
            <input type="text" id="msg-name" placeholder="昵称（选填）" maxlength="20" value="{% if user.is_authenticated %}{{ user.username }}{% endif %}">
            <textarea id="msg-content" placeholder="写下你想说的话..." maxlength="500"></textarea>
          </div>
          <button onclick="sendMessage()">发布</button>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- Case Modal -->
<div class="modal-overlay" id="case-modal">
  <div class="modal"><button class="close" onclick="closeCase()">&times;</button>
    <div class="md-dept" id="md-dept"></div><h3 id="md-title"></h3>
    <div class="story-body" id="md-story"></div><div class="quote" id="md-result"></div>
  </div>
</div>

<!-- Survey -->
<div class="survey-float"><button onclick="openSurvey()">反馈问卷</button></div>
<div class="survey-modal" id="survey-modal">
  <div class="survey-box" id="survey-form-box">
    <h3>反馈问卷</h3>
    <div class="survey-q"><label>这个页面让我愿意继续了解公益内容</label><div class="stars" data-q="1"></div></div>
    <div class="survey-q"><label>我认为音乐与公益结合是有意义的</label><div class="stars" data-q="2"></div></div>
    <div class="survey-q"><label>我愿意进一步了解这个平台</label><div class="stars" data-q="3"></div></div>
    <div class="survey-q"><label>我愿意参与类似公益活动</label><div class="stars" data-q="4"></div></div>
    <div class="survey-q"><label>请留下一句话</label><textarea id="survey-q5" placeholder="写下你想说的话..."></textarea></div>
    <button class="sbtn" onclick="submitSurvey()">提交问卷</button>
  </div>
  <div class="survey-thanks" id="survey-thanks">感谢你的反馈！</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.js"></script>
<script>
var SID='s_'+Date.now()+'_'+Math.random().toString(36).substr(2,8),startTime=Date.now(),ICONS=['🌱','🧘','🎗️','💛','🚲'];
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

// Cases
function loadCases(){fetch('/api/cases/').then(function(r){return r.json()}).then(function(d){document.getElementById('cases-grid').innerHTML=d.cases.map(function(c,i){return '<div class="story-card" onclick="openCase('+c.id+')"><div class="ch"><div class="ci">'+ICONS[i]+'</div><div><h4>'+c.title+'</h4><span class="dept">'+c.disease+'</span></div></div><p class="excerpt">'+c.story.substr(0,80)+'...</p><span class="more">阅读全文 →</span></div>'}).join('')})}
function openCase(id){fetch('/api/cases/').then(function(r){return r.json()}).then(function(d){var c=d.cases.find(function(x){return x.id===id});if(!c)return;document.getElementById('md-dept').textContent=c.disease;document.getElementById('md-title').textContent=c.title;document.getElementById('md-story').textContent=c.story;document.getElementById('md-result').textContent=c.result;document.getElementById('case-modal').classList.add('show')})}
function closeCase(){document.getElementById('case-modal').classList.remove('show')}
document.getElementById('case-modal').addEventListener('click',function(e){if(e.target===this)closeCase()})

// Messages
function loadMessages(){fetch('/api/messages/').then(function(r){return r.json()}).then(function(d){document.getElementById('msg-list').innerHTML=d.messages.map(function(m){return '<div class="msg-item"><div class="msg-avatar">'+m.username.charAt(0)+'</div><div><div class="msg-name">'+m.username+'<span class="msg-time">'+m.created_at+'</span></div><div class="msg-text">'+m.content+'</div></div></div>'}).join('')})}
function sendMessage(){var n=document.getElementById('msg-name').value.trim()||'匿名',c=document.getElementById('msg-content').value.trim();if(!c){toast('请输入留言内容');return}var fd=new FormData();fd.append('username',n);fd.append('content',c);fetch('/api/messages/create/',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){if(d.ok){document.getElementById('msg-content').value='';loadMessages();toast('留言成功')}else toast(d.error)})}

// Survey
var SS={1:0,2:0,3:0,4:0};(function(){document.querySelectorAll('.stars').forEach(function(s){for(var i=1;i<=5;i++){var x=document.createElement('span');x.className='star';x.textContent='★';x.dataset.v=i;x.addEventListener('click',function(){var v=parseInt(this.dataset.v),q=parseInt(this.parentElement.dataset.q);SS[q]=v;Array.from(this.parentElement.children).forEach(function(y,j){y.classList.toggle('active',j<v)})});s.appendChild(x)}})})()
function openSurvey(){document.getElementById('survey-modal').classList.add('show')}
function closeSurvey(){document.getElementById('survey-modal').classList.remove('show')}
document.getElementById('survey-modal').addEventListener('click',function(e){if(e.target===this)closeSurvey()})
function submitSurvey(){if(!SS[1]||!SS[2]||!SS[3]||!SS[4]){toast('请完成全部评分题');return}var fd=new FormData();fd.append('q1',SS[1]);fd.append('q2',SS[2]);fd.append('q3',SS[3]);fd.append('q4',SS[4]);fd.append('q5',document.getElementById('survey-q5').value);fetch('/api/survey/submit/',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){if(d.ok){document.getElementById('survey-form-box').style.display='none';document.getElementById('survey-thanks').style.display='block';setTimeout(closeSurvey,2000)}})}

// Tracking
fetch('/api/track/visit/',{method:'POST',body:new URLSearchParams({session_id:SID,page:'index'})});
var sc=0;window.addEventListener('scroll',function(){var h=document.documentElement,p=Math.round((h.scrollTop/(h.scrollHeight-h.clientHeight))*100);if(p>sc)sc=p})
window.addEventListener('beforeunload',function(){navigator.sendBeacon('/api/track/duration/',new URLSearchParams({session_id:SID,duration_seconds:Math.round((Date.now()-startTime)/1000),scroll_percentage:sc}))})

loadCases();loadMessages();
</script>
</body>
</html>
