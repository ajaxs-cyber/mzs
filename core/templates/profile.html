<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 · 钢琴音乐角</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:#0a0a10; color:#c8c8c8; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
.header { width:100%; background:rgba(10,10,20,0.94); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,0.05); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
.header .logo { font-size:1.05rem; color:#c9a96e; font-weight:300; letter-spacing:3px; text-decoration:none; }
.header .nav a { color:#777; text-decoration:none; font-size:0.83rem; margin-left:22px; transition:color .2s; letter-spacing:1px; }
.header .nav a:hover { color:#c9a96e; }
.container { width:90%; max-width:600px; padding:40px 0 60px; }
.profile-card { background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:38px; }
.profile-header { text-align:center; margin-bottom:32px; }
.avatar { width:82px; height:82px; border-radius:50%; background:linear-gradient(135deg,#c9a96e,#6b5010); color:#1a1a2e; display:inline-flex; align-items:center; justify-content:center; font-size:2rem; font-weight:300; margin-bottom:14px; }
.avatar img { width:82px; height:82px; border-radius:50%; object-fit:cover; }
.profile-header h2 { font-size:1.15rem; color:#ddd; font-weight:400; }
.profile-header .email { font-size:0.82rem; color:#666; margin-top:6px; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; color:#888; font-size:0.82rem; margin-bottom:6px; }
.f-input { width:100%; padding:11px 14px; border:1px solid rgba(255,255,255,0.08); border-radius:8px; font-size:0.9rem; outline:none; background:rgba(0,0,0,0.22); color:#ccc; transition:border .3s; font-family:inherit; resize:vertical; }
.f-input:focus { border-color:#c9a96e; }
.file-hint { font-size:0.73rem; color:#555; margin-top:4px; }
.btn-row { display:flex; gap:10px; margin-top:24px; }
.btn { background:linear-gradient(135deg,#c9a96e,#9a7b2e); color:#1a1a2e; border:none; padding:10px 28px; border-radius:8px; font-size:0.9rem; cursor:pointer; transition:opacity .3s; text-decoration:none; display:inline-block; letter-spacing:1px; font-weight:500; }
.btn:hover { opacity:0.85; }
.btn-outline { background:transparent; color:#c9a96e; border:1px solid rgba(201,169,110,0.3); padding:10px 28px; border-radius:8px; font-size:0.9rem; cursor:pointer; text-decoration:none; transition:all .3s; letter-spacing:1px; }
.btn-outline:hover { background:rgba(201,169,110,0.06); border-color:#c9a96e; }
.toast { position:fixed; top:24px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#c9a96e,#9a7b2e); color:#1a1a2e; padding:10px 30px; border-radius:24px; font-size:0.88rem; z-index:300; opacity:0; pointer-events:none; transition:opacity .3s; font-weight:500; }
.toast.show { opacity:1; }
.back { text-align:center; margin-top:22px; }
.back a { color:#555; font-size:0.8rem; text-decoration:none; transition:color .2s; }
.back a:hover { color:#c9a96e; }
</style>
</head>
<body>
<header class="header">
  <a href="{% url 'index' %}" class="logo">钢琴音乐角</a>
  <nav class="nav">
    <a href="{% url 'index' %}">首页</a>
    <a href="{% url 'profile' %}">个人中心</a>
    <a href="{% url 'logout' %}">退出</a>
  </nav>
</header>

<div class="toast" id="toast"></div>

<div class="container">
  <div class="profile-card">
    <div class="profile-header">
      {% if profile.avatar %}
        <div class="avatar"><img src="{{ profile.avatar.url }}" alt="头像"></div>
      {% else %}
        <div class="avatar">{{ user.username|first|upper }}</div>
      {% endif %}
      <h2>{{ user.username }}</h2>
      <p class="email">{{ user.email }}</p>
    </div>

    {% if success %}<script>setTimeout(function(){var t=document.getElementById('toast');t.textContent='{{ success }}';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);},100);</script>{% endif %}
    {% if error %}<script>setTimeout(function(){var t=document.getElementById('toast');t.textContent='{{ error }}';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);},100);</script>{% endif %}

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group"><label>头像</label><input class="f-input" type="file" name="avatar" accept="image/*"><p class="file-hint">支持 JPG/PNG，建议正方形图片</p></div>
      <div class="form-group"><label>个人简介</label><textarea class="f-input" name="bio" rows="3" placeholder="介绍一下自己...">{{ profile.bio }}</textarea></div>
      <div class="form-group"><label>手机号</label><input class="f-input" type="text" name="phone" value="{{ profile.phone }}" placeholder="选填"></div>
      <div class="btn-row">
        <button class="btn" type="submit">保存资料</button>
        <a href="{% url 'index' %}" class="btn-outline">返回首页</a>
      </div>
    </form>
  </div>
  <div class="back"><a href="{% url 'index' %}">← 返回首页</a></div>
</div>
</body>
</html>
