<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 钢琴音乐角</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Microsoft YaHei","PingFang SC","Noto Serif SC",serif; background:#faf8f5; color:#3a3a3a;
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.auth-card { background:#fff; border-radius:16px; padding:40px 36px; width:90%; max-width:400px;
  box-shadow:0 4px 28px rgba(0,0,0,0.08); }
.auth-card h1 { text-align:center; font-size:1.4rem; color:#8b6914; font-weight:300; letter-spacing:3px; margin-bottom:6px; }
.auth-card .sub { text-align:center; color:#aaa; font-size:0.85rem; margin-bottom:28px; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; color:#666; font-size:0.85rem; margin-bottom:5px; }
.f-input { width:100%; padding:11px 14px; border:1px solid #e0dcd5; border-radius:8px; font-size:0.9rem;
  outline:none; background:#faf8f5; transition:border .3s; font-family:inherit; }
.f-input:focus { border-color:#d4b87a; }
.error-msg { background:#fdf0ef; color:#c0392b; padding:10px 14px; border-radius:8px; margin-bottom:20px; font-size:0.85rem; text-align:center; }
.btn { width:100%; background:#8b6914; color:#fff; border:none; padding:12px; border-radius:8px; font-size:1rem;
  cursor:pointer; transition:opacity .3s; }
.btn:hover { opacity:0.85; }
.links { text-align:center; margin-top:20px; font-size:0.85rem; color:#999; }
.links a { color:#8b6914; text-decoration:none; }
.links a:hover { text-decoration:underline; }
.back { text-align:center; margin-top:20px; }
.back a { color:#bbb; font-size:0.8rem; text-decoration:none; }
</style>
</head>
<body>
<div class="auth-card">
  <h1>用户登录</h1>
  <p class="sub">欢迎回到钢琴音乐角</p>
  {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>用户名或邮箱</label>
      <input class="f-input" type="text" name="username" placeholder="请输入用户名" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input class="f-input" type="password" name="password" placeholder="请输入密码" required>
    </div>
    <button class="btn" type="submit">登录</button>
  </form>
  <div class="links">还没有账号？<a href="{% url 'register' %}">立即注册</a></div>
</div>
<div class="back"><a href="{% url 'index' %}">← 返回首页</a></div>
</body>
</html>
