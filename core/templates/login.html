<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 钢琴音乐角</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:radial-gradient(ellipse 70% 50% at 50% 30%, rgba(180,160,100,0.06) 0%, transparent 60%),#0a0a10; color:#c8c8c8; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.auth-card { background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:44px 38px; width:90%; max-width:400px; }
.auth-card h1 { text-align:center; font-size:1.3rem; color:#c9a96e; font-weight:300; letter-spacing:4px; margin-bottom:8px; }
.auth-card .sub { text-align:center; color:#666; font-size:0.82rem; margin-bottom:32px; letter-spacing:1px; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; color:#888; font-size:0.82rem; margin-bottom:6px; }
.f-input { width:100%; padding:11px 14px; border:1px solid rgba(255,255,255,0.08); border-radius:8px; font-size:0.9rem; outline:none; background:rgba(0,0,0,0.22); color:#ccc; transition:border .3s; font-family:inherit; }
.f-input:focus { border-color:#c9a96e; }
.error-msg { background:rgba(200,60,40,0.08); border:1px solid rgba(200,60,40,0.15); color:#e07b5a; padding:10px 14px; border-radius:8px; margin-bottom:20px; font-size:0.83rem; text-align:center; }
.btn { width:100%; background:linear-gradient(135deg,#c9a96e,#9a7b2e); color:#1a1a2e; border:none; padding:12px; border-radius:8px; font-size:0.95rem; cursor:pointer; transition:opacity .3s; letter-spacing:2px; font-weight:500; }
.btn:hover { opacity:0.85; }
.links { text-align:center; margin-top:22px; font-size:0.83rem; color:#666; }
.links a { color:#c9a96e; text-decoration:none; }
.links a:hover { opacity:0.8; }
.back { text-align:center; margin-top:24px; }
.back a { color:#555; font-size:0.8rem; text-decoration:none; transition:color .2s; }
.back a:hover { color:#c9a96e; }
</style>
</head>
<body>
<div class="auth-card">
  <h1>用户登录</h1>
  <p class="sub">欢迎回到钢琴音乐角</p>
  {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>用户名或邮箱</label><input class="f-input" type="text" name="username" placeholder="请输入用户名" required></div>
    <div class="form-group"><label>密码</label><input class="f-input" type="password" name="password" placeholder="请输入密码" required></div>
    <button class="btn" type="submit">登 录</button>
  </form>
  <div class="links">还没有账号？<a href="{% url 'register' %}">立即注册</a></div>
</div>
<div class="back"><a href="{% url 'index' %}">← 返回首页</a></div>
</body>
</html>
